<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Kube-Quest Redis 동기화 테스트</title>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    #game-board { 
      width: 600px; height: 400px; 
      border: 3px solid #333; 
      position: relative; 
      background: #f4f4f4; 
      cursor: crosshair;
      overflow: hidden;
    }
    .player { 
      width: 20px; height: 20px; 
      position: absolute; 
      border-radius: 50%; 
      transform: translate(-50%, -50%); 
      transition: left 0.1s, top 0.1s; /* 부드러운 이동 효과 */
    }
    .me { background: #e74c3c; z-index: 10; border: 2px solid #c0392b; } /* 내 캐릭터: 빨간색 */
    .other { background: #3498db; border: 2px solid #2980b9; } /* 다른 유저: 파란색 */
  </style>
</head>
<body>
  <h2>🎯 Kube-Quest In-Memory 동기화 보드</h2>
  <p>보드 안쪽을 클릭해서 캐릭터를 이동시켜 보세요!</p>
  <div id="game-board"></div>

  <script>
    // 1. 소켓 서버 연결
    const socket = io('http://localhost:3000');
    const board = document.getElementById('game-board');
    const players = {}; // 화면에 그려진 다른 유저들 저장소

    // 내 캐릭터 DOM 생성
    const myAvatar = document.createElement('div');
    myAvatar.className = 'player me';
    // 초기에는 화면 밖이나 중앙에 숨겨둘 수 있지만 일단 좌상단에 위치
    board.appendChild(myAvatar);

    // 🎯 [핵심 1] 내가 처음 접속했을 때: Redis가 기억하는 기존 유저들 좌표 로드
    socket.on('initPositions', (positions) => {
      console.log('Redis 캐시에서 불러온 초기 좌표:', positions);
      for (const [id, pos] of Object.entries(positions)) {
        if (id !== socket.id) { // 나는 제외하고 그림
          updateOtherPlayer(id, pos);
        }
      }
    });

    // 🎯 [핵심 2] 누군가 움직였을 때 (Redis에 업데이트 됨과 동시에 브로드캐스팅 됨)
    socket.on('playerMoved', (data) => {
      if (data.clientId !== socket.id) {
        updateOtherPlayer(data.clientId, data.position);
      }
    });

    // 🎯 [핵심 3] 누군가 나갔을 때 (Redis에서 삭제됨)
    socket.on('playerDisconnected', (id) => {
      if (players[id]) {
        players[id].remove(); // 화면에서 파란 점 삭제
        delete players[id];
      }
    });

    // 화면 클릭 시 내 좌표를 서버로 전송
    board.addEventListener('click', (e) => {
      const rect = board.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;

      // 내 화면의 빨간 점 이동
      myAvatar.style.left = x + 'px';
      myAvatar.style.top = y + 'px';

      // 서버로 좌표 발송 -> 서버가 Redis에 HSET으로 덮어씀
      socket.emit('move', { x, y });
    });

    // 다른 유저(파란 점)를 화면에 그리거나 위치를 갱신하는 함수
    function updateOtherPlayer(id, pos) {
      if (!players[id]) {
        players[id] = document.createElement('div');
        players[id].className = 'player other';
        board.appendChild(players[id]);
      }
      players[id].style.left = pos.x + 'px';
      players[id].style.top = pos.y + 'px';
    }
  </script>
</body>
</html>
